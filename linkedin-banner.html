<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:#05040a; }
  .wrap {
    position:relative; width:1584px; height:396px; overflow:hidden;
    font-family:"Segoe UI", system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(1150px 700px at 88% -22%, rgba(124,58,237,0.48), transparent 60%),
      linear-gradient(120deg, #0a0913 0%, #110b1f 48%, #0b0916 100%);
  }
  /* subtle dot grid, fades in from the left so the left third stays calm */
  .grid {
    position:absolute; inset:0;
    background-image:radial-gradient(rgba(180,169,240,0.09) 1px, transparent 1px);
    background-size:28px 28px;
    -webkit-mask-image:linear-gradient(90deg, transparent, #000 45%, #000 100%);
            mask-image:linear-gradient(90deg, transparent, #000 45%, #000 100%);
  }
  .col {
    position:absolute; left:430px; right:60px; top:0; bottom:0;
    display:flex; flex-direction:column; justify-content:center;
  }
  .eyebrow {
    font-size:14px; letter-spacing:3.5px; font-weight:600; text-transform:uppercase;
    color:#b3a4ef; margin-bottom:14px; display:flex; align-items:center; gap:12px;
  }
  .eyebrow .dot { width:8px; height:8px; border-radius:50%; background:#8b5cf6;
    box-shadow:0 0 14px 3px rgba(139,92,246,0.85); }
  .name { font-size:52px; line-height:1; font-weight:700; color:#f7f5ff; letter-spacing:-1px; }
  .kicker {
    margin-top:40px; margin-bottom:16px; font-size:12px; letter-spacing:3px;
    font-weight:600; text-transform:uppercase; color:#8a83a8;
  }
  .logos { display:flex; align-items:center; gap:14px; }
  .chip {
    background:#ffffff; border-radius:14px; padding:13px 18px;
    display:flex; align-items:center; justify-content:center; height:64px;
    box-shadow:0 8px 22px rgba(0,0,0,0.32);
  }
  .chip img { height:36px; width:auto; display:block; }
  .chip.sq img { height:44px; }
  .site {
    position:absolute; right:60px; bottom:30px;
    font-size:15px; letter-spacing:0.5px; color:#7f78a0; font-weight:500;
  }
  .site b { color:#c4b5fd; font-weight:600; }
</style>
